version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yalla_extra_backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
    restart: unless-stopped
    networks:
      - yalla-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yalla_extra_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - yalla-network

networks:
  yalla-network:
    driver: bridge
